<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧用藥安全監測小幫手 - 啟動授權</title>
    
    <!-- SMART on FHIR JavaScript Client -->
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2/build/fhir-client.js"></script>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: "Noto Sans TC", system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f4f8, #e0e7ff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .launch-card {
            max-width: 480px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.15);
        }
        .logo-icon {
            font-size: 4.5rem;
            color: #007BFF;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="launch-card card mx-auto">
            <div class="card-body p-5 text-center">
                <!-- Logo & Title -->
                <div class="mb-4">
                    <i class="fas fa-pills logo-icon"></i>
                </div>
                <h2 class="mb-2">智慧用藥安全監測小幫手</h2>
                <p class="text-muted mb-4">請點擊下方按鈕，從 EHR 系統啟動授權</p>

                <!-- 狀態訊息 -->
                <div id="status" class="alert alert-info d-none">
                    正在準備授權流程...
                </div>

                <!-- 主要啟動按鈕 -->
                <button id="launch-btn" class="btn btn-primary btn-lg w-100 py-3 mb-3" onclick="startLaunch()">
                    <i class="fas fa-key me-2"></i>
                    啟動 EHR 授權
                </button>

                <div class="text-center">
                    <small class="text-muted">
                        此應用程式將透過 SMART on FHIR 標準<br>
                        安全取得您的用藥處方與健康資料
                    </small>
                </div>

                <!-- 測試資訊 -->
                <div class="mt-4 pt-3 border-top">
                    <small class="text-secondary">
                        Client ID: <span class="font-monospace">cc344727-6f90-496c-94fd-c7829aa9a51d</span><br>
                        <span class="text-warning">※ 測試階段使用 Confidential Client</span>
                    </small>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 您的 Client 資訊
        const CLIENT_ID = "cc344727-6f90-496c-94fd-c7829aa9a51d";
        
        // 建議使用的 Scope（可依實際需求調整）
        const SCOPES = [
            "launch/patient",      // EHR Launch 必須
            "openid",
            "fhirUser",
            "patient/Patient.read",
            "patient/MedicationRequest.read",
            "patient/MedicationStatement.read",
            "patient/MedicationAdministration.read",
            "patient/Observation.read",
            "online_access"        // 取得 refresh_token
        ].join(" ");

        // 開始 OAuth 授權流程 (EHR Launch)
        async function startLaunch() {
            const btn = document.getElementById('launch-btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>正在啟動授權...`;
            status.classList.remove('d-none');
            status.textContent = "正在導向 SMART Launcher 進行授權...";

            try {
                // 使用 fhirclient 啟動授權
                await FHIR.oauth2.authorize({
                    clientId: CLIENT_ID,
                    scope: SCOPES,
                    redirectUri: window.location.origin + "/index.html",   // 重要：必須與 index.html 路徑一致
                    iss: null,                    // EHR Launch 模式下會由 launcher 帶入 iss
                    launch: null,                 // 由 launcher 提供 launch 參數
                    // 由於是 Confidential Client，PKCE 可選，但建議保留提升安全性
                    pkceMode: "if_available"
                });
            } catch (error) {
                console.error("授權啟動失敗:", error);
                alert("授權流程啟動失敗，請確認網路連線或重新整理頁面後再試。\n\n錯誤：" + error.message);
                
                // 恢復按鈕狀態
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-key me-2"></i>啟動 EHR 授權`;
                status.classList.add('d-none');
            }
        }

        // 頁面載入時檢查是否已經帶有授權參數（防止重複授權）
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.has('code') || urlParams.has('error')) {
                // 如果已經有 code，表示是從授權後 redirect 回來，應該交給 index.html 處理
                window.location.href = "index.html" + window.location.search;
            }
        };

        // 防止使用者直接關閉視窗的提示（可選）
        window.addEventListener('beforeunload', function(e) {
            if (document.getElementById('launch-btn').disabled) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
