<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧用藥安全監測小幫手 - 安全啟動中</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden text-center">
        <div class="gradient-bg py-10 flex flex-col items-center">
            <div class="w-20 h-20 bg-white/20 rounded-3xl flex items-center justify-center text-5xl mb-4 shadow-inner">🩺</div>
            <h1 class="text-white text-2xl font-bold">SMART 臨床啟動</h1>
        </div>

        <div class="p-8">
            <div id="status-container" class="space-y-6">
                <div class="flex justify-center">
                    <div class="spinner border-t-emerald-500 border-emerald-100"></div>
                </div>
                <div>
                    <h2 id="status-title" class="text-xl font-bold text-gray-800">正在建立安全連線</h2>
                    <p id="status-desc" class="text-gray-500 mt-2">正在與 FHIR 伺服器進行 OAuth2 握手驗證...</p>
                </div>
                
                <div id="error-panel" class="hidden bg-red-50 text-red-700 p-4 rounded-2xl text-sm text-left">
                    <p class="font-bold flex items-center gap-2 mb-1">
                        <span class="text-lg">⚠️</span> 啟動失敗
                    </p>
                    <p id="error-message">無法偵測到有效的 FHIR Launch 脈絡。</p>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <p class="text-xs text-gray-400 font-mono" id="server-url">檢測伺服器中...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            // 從 URL 解析參數 (iss 為 FHIR 伺服器位址)
            const urlParams = new URLSearchParams(window.location.search);
            const iss = urlParams.get("iss");
            
            if (iss) {
                document.getElementById('server-url').innerText = `連線至: ${iss}`;
                
                // 發起 SMART 授權請求
                FHIR.oauth2.authorize({
                    // 在此填寫您在該 FHIR Server 註冊的 Client ID
                    "clientId": "my_web_app", 
                    
                    // 請求權限：病患資料、生理紀錄、診斷、處方
                    "scope": "patient/*.read launch openid fhirUser",
                    
                    // 授權完畢後導向的主程式頁面
                    "redirectUri": "index.html",
                    
                    // 在相同視窗完成啟動
                    "completeInTarget": true
                });
            } else {
                // 如果直接開啟 launch.html (非透過 EHR 啟動)
                handleLaunchError("未偵測到 iss 參數。本 App 需由 SMART on FHIR 相容之 EHR 系統啟動。");
            }
        };

        function handleLaunchError(msg) {
            document.querySelector('.spinner').classList.add('hidden');
            document.getElementById('status-title').innerText = "啟動中斷";
            document.getElementById('status-title').classList.add('text-red-600');
            document.getElementById('status-desc').innerText = "請確認啟動環境或連線參數。";
            
            const errorPanel = document.getElementById('error-panel');
            errorPanel.classList.remove('hidden');
            document.getElementById('error-message').innerText = msg;

            // 提供一個手動進入 Demo 的選項
            const demoBtn = document.createElement('button');
            demoBtn.className = "mt-4 w-full py-3 bg-gray-800 text-white rounded-2xl font-medium hover:bg-gray-700 transition-colors";
            demoBtn.innerText = "手動進入 Demo 模式";
            demoBtn.onclick = () => window.location.href = 'index.html';
            errorPanel.appendChild(demoBtn);
        }
    </script>
</body>
</html>
