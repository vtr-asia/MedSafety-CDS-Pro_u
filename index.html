<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糖尿病用藥決策支援系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface-2: #f8fafc;
    --border: #e2e8f0;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --accent-blue: #2563eb;
    --accent-teal: #0d9488;
    --accent-red: #dc2626;
    --accent-amber: #d97706;
    --accent-green: #16a34a;
    --nav-bg: #0f172a;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.1), 0 8px 32px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── 載入動畫 ── */
  .fade-in {
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stagger-1 { animation-delay: 0.05s; opacity: 0; }
  .stagger-2 { animation-delay: 0.12s; opacity: 0; }
  .stagger-3 { animation-delay: 0.19s; opacity: 0; }
  .stagger-4 { animation-delay: 0.26s; opacity: 0; }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* ── Nav ── */
  .nav-bar {
    background: var(--nav-bg);
    position: sticky; top: 0; z-index: 40;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
  }

  /* ── 病人卡片 ── */
  .patient-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    overflow: hidden;
  }
  .patient-card-banner {
    height: 6px;
    background: linear-gradient(90deg, #2563eb, #0d9488, #16a34a);
  }

  /* ── 指標卡片 ── */
  .metric-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .metric-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--card-shadow-hover);
  }
  .metric-accent {
    height: 3px;
    border-radius: 3px 3px 0 0;
  }

  /* ── 通用卡片 ── */
  .card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
  }

  /* ── CDS 面板 ── */
  .cds-panel {
    background: var(--nav-bg);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .cds-item {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.07);
    transition: background 0.15s;
  }
  .cds-item:hover { background: rgba(255,255,255,0.09); }

  /* ── 衛教卡片 ── */
  .edu-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid #d1fae5;
    box-shadow: var(--card-shadow);
  }
  .edu-item {
    background: #f0fdf4;
    border-radius: 10px;
    border: 1px solid #bbf7d0;
    transition: background 0.15s;
  }
  .edu-item:hover { background: #dcfce7; }

  /* ── Tab 按鈕 ── */
  .tab-btn {
    transition: all 0.15s;
    font-weight: 500;
  }
  .tab-btn.active {
    background: #0d9488 !important;
    color: white !important;
    border-color: #0d9488 !important;
    box-shadow: 0 2px 8px rgba(13,148,136,0.3);
  }
  .edu-tab-content { display: none; }
  .edu-tab-content.active { display: block; }

  /* ── 衛教 Modal ── */
  .modal-backdrop {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
  }
  .edu-modal-inner {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
  }
  .modal-header {
    background: linear-gradient(135deg, #0d9488, #0f766e);
  }

  /* ── 表格 ── */
  .obs-table th { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .obs-row { transition: background 0.12s; }
  .obs-row:hover { background: var(--surface-2); }

  /* ── Badge ── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600;
  }
  .badge-red    { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .badge-amber  { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
  .badge-green  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .badge-blue   { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  .badge-gray   { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }

  /* ── 錯誤狀態 ── */
  .error-box {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 16px;
  }

  /* ── 數值大字 ── */
  .value-display {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    line-height: 1;
  }

  /* ── 狀態指示燈 ── */
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-dot.live {
    background: #22c55e;
    box-shadow: 0 0 0 0 rgba(34,197,94,0.6);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
    70%  { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }

  /* ── 頁尾 ── */
  footer { border-top: 1px solid var(--border); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
