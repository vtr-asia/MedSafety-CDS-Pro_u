<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧用藥安全監測 Pro | Stage 2 認證版</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loader" class="fixed inset-0 bg-white/95 z-[9999] flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-emerald-800 font-bold text-lg" id="loader-text">正在建立安全連線...</p>
    </div>

    <div class="max-w-7xl mx-auto min-h-screen">
        <nav class="bg-white border-b px-8 py-5 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-600 text-white p-2 rounded-lg text-2xl">🩺</div>
                <h1 class="text-xl font-bold text-gray-800">智慧用藥安全監測 <span class="text-emerald-500">Pro_u</span></h1>
            </div>
            <div id="patient-tab" class="hidden flex items-center gap-4 bg-emerald-50 px-4 py-2 rounded-2xl border border-emerald-100">
                <div class="text-right">
                    <p id="p-name" class="font-bold text-gray-800">載入中...</p>
                    <p id="p-info" class="text-xs text-emerald-600 font-mono">--</p>
                </div>
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center border border-emerald-200 text-emerald-600">
                    <i class="fa-solid fa-user-check"></i>
                </div>
            </div>
        </nav>

        <main class="p-8">
            <div id="main-content" class="grid grid-cols-1 md:grid-cols-3 gap-6 opacity-0 transition-opacity duration-500">
                <!-- 最新收縮壓 -->
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h3 class="text-gray-400 text-xs font-bold uppercase mb-2">最新收縮壓</h3>
                    <div class="text-5xl font-black text-emerald-600" id="v-sbp">--</div>
                    <p class="text-gray-400 text-xs mt-2" id="v-sbp-time">最後量測：未偵測</p>
                </div>

                <!-- 臨床診斷 -->
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h3 class="text-gray-400 text-xs font-bold uppercase mb-2">臨床診斷 (Active)</h3>
                    <div id="cond-list" class="space-y-2 max-h-40 overflow-y-auto">
                        <p class="text-gray-300 text-sm">讀取中...</p>
                    </div>
                </div>

                <!-- CDS 決策支援 + 用藥清單 -->
                <div class="bg-gray-900 p-6 rounded-3xl text-white shadow-xl">
                    <div class="flex items-center gap-2 text-emerald-400 mb-3">
                        <i class="fa-solid fa-robot"></i>
                        <span class="font-bold">CDS-Decision Support</span>
                    </div>
                    <p id="ai-suggestion" class="text-sm opacity-90 leading-relaxed">正在分析病患用藥與臨床指標...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // LOINC 代碼（收縮壓）
        const LOINC_SBP = "8480-6";

        async function init() {
            document.getElementById('loader-text').innerText = "正在進行 SMART on FHIR 認證...";

            try {
                // === 學習成功案例的核心寫法 ===
                const smart = await FHIR.oauth2.ready();   // 不傳參數，最穩定

                console.log("✅ SMART 連線成功！Patient ID:", smart.patient.id);

                document.getElementById('loader-text').innerText = "連線成功，正在讀取 FHIR 資源...";

                const pid = smart.patient.id;

                // 同時抓取多個資源（與成功案例一致）
                const [patient, obs, conds, meds] = await Promise.all([
                    smart.request(`Patient/${pid}`),
                    smart.request(`Observation?patient=${pid}&code=85354-9&_sort=-date&_count=1`),
                    smart.request(`Condition?patient=${pid}&clinical-status=active`),
                    smart.request(`MedicationRequest?patient=${pid}&status=active`)
                ]);

                renderData(patient, obs, conds, meds, true);

            } catch (err) {
                console.error("❌ SMART 認證失敗:", err);
                
                document.getElementById('loader-text').innerHTML = `
                    <div class="text-red-500 p-6 text-center">
                        <p class="font-bold text-lg">SMART 授權失敗</p>
                        <p class="text-sm mt-2 opacity-80">${err.message || err}</p>
                        <p class="text-xs mt-4">正在切換至 DEMO 模式...</p>
                    </div>`;

                // 失敗後自動進入 DEMO 模式（使用臺灣公開測試伺服器）
                setTimeout(loadDemoMode, 1800);
            }
        }

        // ====================== DEMO 模式（hapi.fhir.tw） ======================
        async function loadDemoMode() {
            try {
                document.getElementById('loader-text').innerText = "進入 DEMO 模式（臺灣 FHIR 測試伺服器）...";

                const client = new FHIR.Client({ 
                    serverUrl: "https://hapi.fhir.tw/fhir" 
                });

                // 取得一個公開測試病患
                const patBundle = await client.request("Patient?_count=1");
                const patient = patBundle.entry?.[0]?.resource;
                if (!patient) throw new Error("無法取得測試病患");

                const pid = patient.id;

                const [obs, conds, meds] = await Promise.all([
                    client.request(`Observation?patient=${pid}&code=85354-9&_sort=-date&_count=1`),
                    client.request(`Condition?patient=${pid}&clinical-status=active`),
                    client.request(`MedicationRequest?patient=${pid}&status=active`)
                ]);

                renderData(patient, obs, conds, meds, false);

            } catch (e) {
                console.error("DEMO 模式失敗:", e);
                document.getElementById('loader-text').innerHTML = `
                    <div class="text-red-500 p-6 text-center">
                        <p class="font-bold">連線失敗</p>
                        <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-gray-800 text-white rounded-xl">重試</button>
                    </div>`;
            }
        }

        // ====================== 共用渲染函式 ======================
        function renderData(patient, obs, conds, meds, isSmart) {
            // 1. 病人資訊
            document.getElementById('patient-tab').classList.remove('hidden');
            const pName = patient.name ? (patient.name[0].text || "匿名病患") : "匿名病患";
            document.getElementById('p-name').innerText = pName;
            document.getElementById('p-info').innerText = `${patient.id.substring(0,8)}... | ${patient.birthDate || "未知"}`;

            // 2. 最新收縮壓
            let sbpValue = "--";
            let sbpTime = "最後量測：未偵測";
            let aiText = "✅ 目前生理指標穩定。";

            if (obs.entry && obs.entry.length > 0) {
                const res = obs.entry[0].resource;
                const sbpComp = res.component?.find(c => 
                    c.code.coding?.some(cc => cc.code === LOINC_SBP)
                );
                if (sbpComp && sbpComp.valueQuantity) {
                    sbpValue = sbpComp.valueQuantity.value;
                    sbpTime = `最後量測：${new Date(res.effectiveDateTime).toLocaleDateString('zh-TW')}`;
                    
                    if (sbpValue > 140) {
                        aiText = `<span class="text-red-400 font-bold">🚨 血壓警示：</span>收縮壓 ${sbpValue} mmHg 偏高，建議確認降血壓藥物使用情況。`;
                    }
                }
            }

            document.getElementById('v-sbp').innerText = sbpValue;
            document.getElementById('v-sbp-time').innerText = sbpTime;

            // 3. 臨床診斷
            const condHtml = (conds.entry || []).map(e => `
                <div class="text-sm bg-gray-50 p-3 rounded-xl border border-gray-100">
                    • ${e.resource.code?.text || "未命名診斷"}
                </div>
            `).join('') || '<p class="text-gray-400 text-sm">無活動中診斷</p>';
            document.getElementById('cond-list').innerHTML = condHtml;

            // 4. 用藥清單摘要（重點加強）
            let medSummary = "";
            if (meds.entry && meds.entry.length > 0) {
                const medNames = meds.entry.slice(0, 4).map(e => 
                    e.resource.medicationCodeableConcept?.text || "未知藥物"
                ).join("、");
                medSummary = `<br><span class="text-emerald-400">💊 目前活躍用藥 (${meds.entry.length} 項)：</span>${medNames}`;
            } else {
                medSummary = `<br><span class="text-gray-400">目前無活躍處方藥</span>`;
            }

            document.getElementById('ai-suggestion').innerHTML = aiText + medSummary;

            // 顯示主內容
            document.getElementById('main-content').classList.remove('opacity-0');
            document.getElementById('loader').classList.add('hidden');

            // DEMO 模式標記
            if (!isSmart) {
                const nav = document.querySelector('nav');
                const badge = document.createElement('div');
                badge.className = "ml-auto bg-amber-100 text-amber-700 text-xs font-bold px-4 py-1.5 rounded-2xl flex items-center gap-1";
                badge.innerHTML = `🔬 DEMO 模式 (hapi.fhir.tw)`;
                nav.appendChild(badge);
            }
        }

        // 啟動
        window.onload = init;
    </script>
</body>
</html>
