<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FHIR MedSafety CDS Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #0f172a; --accent: #2563eb; --danger: #ef4444; --warning: #f59e0b;
      --success: #10b981; --bg: #f8fafc; --card: #ffffff;
    }
    
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui; background: var(--bg); margin: 0; color: #1e293b; overflow-x: hidden; }

    /* 動態載入動畫 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 佈局架構 */
    .app-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar { background: var(--brand); color: white; padding: 30px 20px; }
    .main-content { padding: 40px; }

    /* 卡片與元件 */
    .card { 
      background: var(--card); border-radius: 16px; padding: 24px; 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;
      animation: fadeInUp 0.5s ease-out forwards;
    }
    
    .view { display: none; }
    .view.active { display: block; }

    /* 指標動態樣式 */
    .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .metric-card { padding: 20px; border-radius: 12px; background: #fff; border-bottom: 4px solid #e2e8f0; }
    .metric-card.alert { border-bottom-color: var(--danger); animation: pulse 2s infinite; }
    .metric-card.warn { border-bottom-color: var(--warning); }
    .metric-value { font-size: 2.5rem; font-weight: 700; margin: 10px 0; }
    .metric-label { font-size: 0.875rem; font-weight: 600; color: #64748b; text-transform: uppercase; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    /* CDS 建議卡片項目 */
    .cds-item { 
      padding: 16px; border-radius: 12px; margin-bottom: 12px; 
      border-left: 6px solid #cbd5e0; background: #f1f5f9; 
    }
    .cds-critical { border-left-color: var(--danger); background: #fef2f2; color: #991b1b; }
    .cds-warning { border-left-color: var(--warning); background: #fffbeb; color: #92400e; }

    .btn-action { 
      width: 100%; padding: 12px; border-radius: 8px; border: none; 
      background: var(--accent); color: white; font-weight: 600; cursor: pointer;
      margin-top: 10px; transition: 0.2s;
    }
    .btn-action:hover { background: #1d4ed8; }

    .patient-selector-card { cursor: pointer; transition: 0.3s; }
    .patient-selector-card:hover { border-color: var(--accent); transform: scale(1.02); }
  </style>
</head>
<body>

<div class="app-layout">
  <div class="sidebar">
    <h2 style="color: #38bdf8;">MedSafety CDS</h2>
    <p style="font-size: 0.8rem; opacity: 0.7;">FHIR Server: THAS MOHW</p>
    <hr style="opacity: 0.2; margin: 20px 0;">
    <nav>
      <div style="padding: 10px 0; font-weight: 600; color: #38bdf8;">臨床監測首頁</div>
      <div style="padding: 10px 0; opacity: 0.5;">歷史診斷紀錄</div>
      <div style="padding: 10px 0; opacity: 0.5;">系統參數設定</div>
    </nav>
  </div>

  <div class="main-content">
    <div id="selectorView" class="view active">
      <h1 style="margin-bottom: 30px;">請選擇病患進行決策支援</h1>
      <div id="patientGrid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:24px;"></div>
    </div>

    <div id="dashboardView" class="view">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <button onclick="showView('selectorView')" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:600;">← 返回病患列表</button>
        <span id="syncTime" style="font-size: 0.8rem; color: #64748b;">資料同步時間: 2026-01-08</span>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 350px; gap: 30px;">
        <div>
          <div class="card" style="margin-bottom: 30px;">
            <div style="display:flex; justify-content:space-between;">
                <h1 id="ptName" style="margin:0;">---</h1>
                <div style="text-align:right;">
                    <span id="ptAge" style="font-weight:bold; font-size:1.2rem;">--</span>
                    <div style="font-size:0.8rem; color:#64748b;">病患年齡 (Patient Age)</div>
                </div>
            </div>
            
            <div class="metric-grid" id="metricsRow"></div>
            
            <h3>糖化血色素趨勢 (HbA1c History)</h3>
            <canvas id="hba1cChart" height="120"></canvas>
          </div>
        </div>

        <div>
          <div class="card" style="position: sticky; top: 40px; border-top: 5px solid var(--accent);">
            <h3 style="margin-top:0;">🤖 智慧決策建議 (CDS)</h3>
            <div id="cdsList"></div>
            <button class="btn-action" onclick="alert('建議已發送至醫囑系統')">接受並更新處方</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // --- 資料與狀態管理 ---
  let context = { pt: null, chart: null };

  // 模擬 THAS Server 上傳的真實情境資料
  const demoPatients = [
    { id: "690785", name: "張小明", age: 48, gender: "男", egfr: 25, hba1c: 8.5, med: "Metformin", history: [9.2, 8.8, 8.5], alertType: 'Renal' },
    { id: "690788", name: "李奶奶", age: 82, gender: "女", egfr: 55, hba1c: 7.2, med: "Diazepam", history: [7.5, 7.3, 7.2], alertType: 'Geriatric' },
    { id: "690780", name: "王先生", age: 60, gender: "男", egfr: 75, hba1c: 6.8, med: "Aspirin + Warfarin", history: [7.0, 6.9, 6.8], alertType: 'DDI' }
  ];

  window.onload = () => {
    renderSelector();
  };

  function renderSelector() {
    const grid = document.getElementById('patientGrid');
    grid.innerHTML = demoPatients.map(p => `
      <div class="card patient-selector-card" onclick="initDashboard('${p.id}')">
        <h2 style="margin:0 0 10px 0;">${p.name}</h2>
        <div style="color: #64748b; font-size: 0.9rem;">ID: ${p.id} | ${p.gender} | ${p.age}歲</div>
        <div style="margin-top: 15px;">
           <span class="tag" style="background:#f1f5f9; padding:4px 8px; border-radius:4px; font-size:0.8rem;">eGFR: ${p.egfr}</span>
           <span class="tag" style="background:#f1f5f9; padding:4px 8px; border-radius:4px; font-size:0.8rem;">HbA1c: ${p.hba1c}%</span>
        </div>
      </div>
    `).join('');
  }

  function initDashboard(id) {
    context.pt = demoPatients.find(x => x.id === id);
    showView('dashboardView');
    renderDashboard();
  }

  // --- 動態數值跳動效果 ---
  function animateValue(id, start, end, duration) {
    const obj = document.getElementById(id);
    let startTimestamp = null;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progress = Math.min((timestamp - startTimestamp) / duration, 1);
      const current = (progress * (end - start) + start).toFixed(1);
      obj.innerHTML = current + (id.includes('hba1c') ? '%' : '');
      if (progress < 1) window.requestAnimationFrame(step);
    };
    window.requestAnimationFrame(step);
  }

  function renderDashboard() {
    const p = context.pt;
    document.getElementById('ptName').innerText = p.name;
    document.getElementById('ptAge').innerText = p.age + "歲";
    
    // 動態渲染指標與動畫
    document.getElementById('metricsRow').innerHTML = `
      <div class="metric-card ${p.egfr < 30 ? 'alert' : ''}">
        <div class="metric-label">eGFR (腎功能)</div>
        <div class="metric-value" id="val-egfr">0</div>
      </div>
      <div class="metric-card ${p.hba1c > 7 ? 'warn' : ''}">
        <div class="metric-label">HbA1c (糖化血色素)</div>
        <div class="metric-value" id="val-hba1c">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">目前使用藥物</div>
        <div style="font-size:1.1rem; font-weight:bold; margin-top:20px;">${p.med}</div>
      </div>
    `;

    setTimeout(() => {
        animateValue("val-egfr", 0, p.egfr, 1000);
        animateValue("val-hba1c", 0, p.hba1c, 1000);
    }, 500);

    renderChart(p.history);
    renderCDS(p);
  }

  function renderCDS(p) {
    const list = document.getElementById('cdsList');
    let html = "";

    // 整合邏輯：腎功能與 Metformin (情境二)
    if (p.egfr < 30 && p.med.includes("Metformin")) {
      html += `
        <div class="cds-item cds-critical">
          <strong>🚨 嚴重禁忌症警示</strong><br>
          <small>病患 eGFR 為 ${p.egfr}。根據 KDIGO 指引，eGFR < 30 禁用 Metformin，以避免乳酸中毒風險。</small>
        </div>`;
    }

    // 整合邏輯：高齡與 Diazepam (情境三 - Beers Criteria)
    if (p.age >= 65 && p.med.includes("Diazepam")) {
      html += `
        <div class="cds-item cds-warning">
          <strong>🟠 高齡用藥風險 (Beers Criteria)</strong><br>
          <small>病患 ${p.age} 歲。長期使用 Diazepam (長效 BZD) 會顯著增加跌倒、意識障礙與骨折風險。</small>
        </div>`;
    }

    // 整合邏輯：DDI (情境一)
    if (p.med.includes("Warfarin") && p.med.includes("Aspirin")) {
        html += `
        <div class="cds-item cds-critical">
          <strong>🚨 嚴重藥物交互作用 (DDI)</strong><br>
          <small>Warfarin 與 Aspirin 併用會極大增加消化道出血風險。請評估必要性並考慮加開 PPI。</small>
        </div>`;
    }

    list.innerHTML = html || '<p style="color:#64748b;">✅ 目前未偵測到顯著用藥風險。</p>';
  }

  function renderChart(history) {
    const ctx = document.getElementById('hba1cChart').getContext('2d');
    if (context.chart) context.chart.destroy();
    context.chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['前三次', '前二次', '最近'],
        datasets: [{
          data: history, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, tension: 0.4
        }]
      },
      options: { plugins: { legend: { display: false } }, scales: { y: { min: 5, max: 11 } } }
    });
  }

  function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
  }
</script>
</body>
</html>
