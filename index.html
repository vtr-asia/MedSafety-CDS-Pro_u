<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSafety CDS Pro | 用藥安全臨床決策支援</title>
<script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface2:  #1c2230;
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.14);
  --text:      #e6edf3;
  --text2:     #8b949e;
  --text3:     #484f58;
  --green:     #3fb950;
  --green-dim: rgba(63,185,80,0.15);
  --amber:     #d29922;
  --amber-dim: rgba(210,153,34,0.15);
  --red:       #f85149;
  --red-dim:   rgba(248,81,73,0.15);
  --blue:      #58a6ff;
  --blue-dim:  rgba(88,166,255,0.12);
  --violet:    #bc8cff;
  --violet-dim:rgba(188,140,255,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── 載入器 ── */
#loader {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
}
.loader-ring {
  width: 56px; height: 56px;
  border: 3px solid var(--border2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 滾動條 ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Nav ── */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 40;
}

/* ── 病人橫幅 ── */
.patient-banner {
  background: linear-gradient(135deg, #0d2020 0%, #0a1a2e 100%);
  border: 1px solid var(--border2);
  border-radius: 16px;
  overflow: hidden;
  position: relative;
}
.patient-banner::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg, transparent, transparent 24px,
    rgba(255,255,255,0.012) 24px, rgba(255,255,255,0.012) 25px
  );
}
.patient-avatar {
  width: 64px; height: 64px;
  background: var(--green-dim);
  border: 2px solid rgba(63,185,80,0.3);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}

/* ── 卡片 ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border2); }

.card-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap-8px;
}

/* ── 指標大字 ── */
.metric-value {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  line-height: 1;
}

/* ── 警示卡片 ── */
.alert-card {
  border-radius: 12px;
  padding: 12px 14px;
  display: flex; gap: 12px; align-items: flex-start;
  border-left: 3px solid;
  position: relative;
  overflow: hidden;
}
.alert-card::after {
  content: '';
  position: absolute; inset: 0;
  opacity: 0.06;
  pointer-events: none;
}
.alert-critical  { background: var(--red-dim);    border-color: var(--red);    }
.alert-warning   { background: var(--amber-dim);  border-color: var(--amber);  }
.alert-info      { background: var(--blue-dim);   border-color: var(--blue);   }
.alert-success   { background: var(--green-dim);  border-color: var(--green);  }
.alert-med       { background: var(--violet-dim); border-color: var(--violet); }

.alert-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
.alert-critical .alert-icon  { color: var(--red);    }
.alert-warning  .alert-icon  { color: var(--amber);  }
.alert-info     .alert-icon  { color: var(--blue);   }
.alert-success  .alert-icon  { color: var(--green);  }
.alert-med      .alert-icon  { color: var(--violet); }

/* ── 脈動點 ── */
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(248,81,73,0.5); }
  70%  { box-shadow: 0 0 0 8px rgba(248,81,73,0); }
  100% { box-shadow: 0 0 0 0 rgba(248,81,73,0); }
}
.pulse-red {
  display: inline-block; width: 8px; height: 8px;
  background: var(--red); border-radius: 50%;
  animation: pulse-ring 1.8s ease infinite;
  flex-shrink: 0; margin-top: 5px;
}
@keyframes pulse-amber {
  0%   { box-shadow: 0 0 0 0 rgba(210,153,34,0.5); }
  70%  { box-shadow: 0 0 0 8px rgba(210,153,34,0); }
  100% { box-shadow: 0 0 0 0 rgba(210,153,34,0); }
}
.pulse-amber {
  display: inline-block; width: 8px; height: 8px;
  background: var(--amber); border-radius: 50%;
  animation: pulse-amber 2.2s ease infinite;
  flex-shrink: 0; margin-top: 5px;
}
.dot-green {
  display: inline-block; width: 7px; height: 7px;
  background: var(--green); border-radius: 50%; flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.blink { animation: blink 1.5s ease-in-out infinite; }

/* ── 藥物標籤 ── */
.med-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  border: 1px solid;
}

/* ── 診斷標籤 ── */
.cond-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  transition: border-color 0.15s;
}
.cond-chip:hover { border-color: var(--border2); }

/* ── 分隔線 ── */
.divider { border: none; border-top: 1px solid var(--border); }

/* ── 淡入動畫 ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both; }
.d1 { animation-delay: 0.04s; }
.d2 { animation-delay: 0.10s; }
.d3 { animation-delay: 0.17s; }
.d4 { animation-delay: 0.24s; }
.d5 { animation-delay: 0.31s; }

/* ── CDS 面板標題 ── */
.cds-panel {
  background: linear-gradient(160deg, #0e1f1e 0%, #0d1117 100%);
  border: 1px solid rgba(63,185,80,0.2);
  border-radius: 14px;
}

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  border: 1px solid;
}
.badge-red    { color: var(--red);    background: var(--red-dim);    border-color: rgba(248,81,73,0.3); }
.badge-amber  { color: var(--amber);  background: var(--amber-dim);  border-color: rgba(210,153,34,0.3); }
.badge-green  { color: var(--green);  background: var(--green-dim);  border-color: rgba(63,185,80,0.3); }
.badge-blue   { color: var(--blue);   background: var(--blue-dim);   border-color: rgba(88,166,255,0.3); }
.badge-violet { color: var(--violet); background: var(--violet-dim); border-color: rgba(188,140,255,0.3); }
.badge-gray   { color: var(--text2);  background: var(--surface2);   border-color: var(--border2); }

/* ── 安全評分環 ── */
.score-ring {
  position: relative; width: 96px; height: 96px; flex-shrink: 0;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring .score-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 500;
}

/* ── 進度條 ── */
.progress-bar {
  height: 4px; border-radius: 2px;
  background: var(--border);
  overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  transition: width 1s ease;
}

/* ── section 標題 ── */
.section-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text3);
}
</style>
</head>

<body>

<!-- ── 載入 ── -->
<div id="loader">
  <div class="loader-ring"></div>
  <div style="text-align:center">
    <p style="color:var(--text);font-weight:600" id="loader-text">正在建立安全連線...</p>
    <p style="color:var(--text2);font-size:12px;margin-top:4px" id="loader-sub">SMART on FHIR 認證中</p>
  </div>
</div>

<!-- ── Nav ── -->
<nav class="nav px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div style="width:32px;height:32px;background:var(--green-dim);border:1px solid rgba(63,185,80,0.4);border-radius:8px;display:flex;align-items:center;justify-content:center">
      <i class="fa-solid fa-shield-halved" style="color:var(--green);font-size:14px"></i>
    </div>
    <span style="font-weight:700;font-size:15px">MedSafety <span style="color:var(--green)">CDS Pro</span></span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div id="mode-badge" class="badge badge-gray" style="display:none"></div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)">
      <span class="dot-green blink"></span>
      <span style="font-family:'JetBrains Mono',monospace">FHIR R4</span>
    </div>
  </div>
</nav>

<!-- ── 主內容 ── -->
<main id="main-content" style="display:none;max-width:1280px;margin:0 auto;padding:20px 20px 40px">

  <!-- 病人橫幅 -->
  <div class="patient-banner fade-up d1 mb-5 p-5">
    <div style="display:flex;align-items:center;gap:16px;position:relative">
      <div class="patient-avatar" id="p-avatar">👤</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:22px;font-weight:700;line-height:1.2" id="p-name">載入中...</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px" id="p-meta-badges"></div>
      </div>
      <div id="safety-score-box" style="text-align:center;flex-shrink:0"></div>
    </div>
  </div>

  <!-- 主格線 -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px" id="grid-top">

    <!-- 生理指標 -->
    <div class="card fade-up d2">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <i class="fa-solid fa-heart-pulse" style="color:var(--red);font-size:13px"></i>
        <span class="section-label">生理指標</span>
      </div>
      <div id="vitals-content" style="padding:16px;display:flex;flex-direction:column;gap:14px">
        <p style="color:var(--text2);font-size:13px">讀取中...</p>
      </div>
    </div>

    <!-- 臨床診斷 -->
    <div class="card fade-up d3">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <i class="fa-solid fa-file-medical" style="color:var(--blue);font-size:13px"></i>
        <span class="section-label">臨床診斷</span>
        <span class="badge badge-blue" id="cond-count" style="margin-left:auto"></span>
      </div>
      <div id="cond-content" style="padding:14px;display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto">
        <p style="color:var(--text2);font-size:13px">讀取中...</p>
      </div>
    </div>

    <!-- 目前用藥 -->
    <div class="card fade-up d4">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <i class="fa-solid fa-pills" style="color:var(--violet);font-size:13px"></i>
        <span class="section-label">目前用藥</span>
        <span class="badge badge-violet" id="med-count" style="margin-left:auto"></span>
      </div>
      <div id="med-content" style="padding:14px;display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto">
        <p style="color:var(--text2);font-size:13px">讀取中...</p>
      </div>
    </div>
  </div>

  <!-- CDS 建議 + 安全警告 全寬 -->
  <div class="cds-panel fade-up d5 mt-4 p-5">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;background:var(--green-dim);border:1px solid rgba(63,185,80,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center">
          <i class="fa-solid fa-brain" style="color:var(--green);font-size:12px"></i>
        </div>
        <span style="font-weight:700;font-size:13px;color:var(--green)">CDS 臨床決策支援</span>
        <span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace">— 基於 FHIR 資料即時運算</span>
      </div>
      <div id="cds-summary-badges" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>

    <!-- 安全警告區 -->
    <div id="safety-alerts" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px"></div>

    <hr class="divider" style="margin-bottom:16px">

    <!-- CDS 建議區 -->
    <div style="margin-bottom:8px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)">
      個人化管理建議
    </div>
    <div id="cds-recommendations" style="display:grid;grid-template-columns:1fr 1fr;gap:10px"></div>
  </div>

</main>

<!-- ── 錯誤區 ── -->
<div id="error-box" style="display:none;max-width:500px;margin:80px auto;padding:32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;text-align:center">
  <i class="fa-solid fa-circle-exclamation" style="font-size:32px;color:var(--red);margin-bottom:12px"></i>
  <h2 style="font-size:16px;font-weight:700;color:var(--red);margin-bottom:8px">連線失敗</h2>
  <p id="error-msg" style="font-size:13px;color:var(--text2);line-height:1.6"></p>
  <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;font-size:13px;cursor:pointer">重新載入</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// LOINC codes
const LOINC_BP_PANEL = '85354-9';
const LOINC_SBP      = '8480-6';
const LOINC_DBP      = '8462-4';
const LOINC_HBAC     = '4548-4';
const LOINC_GLUCOSE  = '2345-7';
const LOINC_CREAT    = '2160-0';
const LOINC_HR       = '8867-4';

// ── 藥物安全知識庫（CDS 規則引擎） ─────────────────────────────
const DRUG_INTERACTIONS = [
  { drugs: ['warfarin','華法林'], flagWith: ['aspirin','阿斯匹靈','ibuprofen','布洛芬'], severity: 'critical',
    msg: 'Warfarin + NSAIDs 嚴重交互作用：大幅增加出血風險，應監測 INR 並評估替代療法。' },
  { drugs: ['metformin','二甲雙胍','metformin hcl'], flagWith: ['ibuprofen','布洛芬','naproxen'],
    severity: 'warning', msg: 'Metformin + NSAIDs：NSAID 可能降低腎臟灌流，增加乳酸中毒風險。' },
  { drugs: ['lisinopril','losartan','amlodipine','ramipril','enalapril'], flagWith: ['potassium','氯化鉀','spironolactone','螺內酯'],
    severity: 'warning', msg: 'ACEI/ARB + 保鉀藥物：注意高鉀血症風險，定期監測血鉀。' },
  { drugs: ['simvastatin','辛伐他汀'], flagWith: ['amlodipine','氨氯地平'],
    severity: 'warning', msg: 'Simvastatin + Amlodipine：Simvastatin 劑量應≤20mg，高劑量恐引發肌病。' },
  { drugs: ['digoxin','地高辛'], flagWith: ['amiodarone','胺碘酮','clarithromycin'],
    severity: 'critical', msg: 'Digoxin 交互作用：血中濃度可能升高至毒性範圍，需監測心律與 Digoxin 濃度。' },
];

// 診斷驅動建議
const CONDITION_RECOMMENDATIONS = {
  '高血壓':     { icon: 'fa-heart', color: 'var(--blue)',   text: '建議每日量測血壓，目標 <130/80 mmHg。低鈉飲食（<2g/日），定期追蹤腎功能與電解質。' },
  'hypertension':{ icon: 'fa-heart', color: 'var(--blue)',  text: '血壓管理目標 <130/80 mmHg，優先使用 ACEI/ARB 保護腎臟，定期評估心血管風險。' },
  '糖尿病':     { icon: 'fa-droplet', color: 'var(--amber)', text: 'HbA1c 目標 <7%，空腹血糖 80–130 mg/dL。每年完成眼底、足部、腎功能篩檢。' },
  'diabetes':   { icon: 'fa-droplet', color: 'var(--amber)', text: 'HbA1c target <7%. Annual screening for retinopathy, nephropathy, and neuropathy.' },
  '心臟衰竭':   { icon: 'fa-heart-crack', color: 'var(--red)', text: '每日監測體重，增加 >2kg/3日需就醫。嚴格限水（<1.5L/日），低鈉飲食。' },
  '慢性腎臟病': { icon: 'fa-kidney', color: 'var(--violet)', text: 'CKD 患者應避免 NSAIDs；Metformin 在 eGFR<30 時應停用；調整腎排泄藥物劑量。' },
  '心房顫動':   { icon: 'fa-wave-square', color: 'var(--red)', text: '評估 CHA₂DS₂-VASc 分數，考慮抗凝治療。避免高危出血活動，監測 INR（若用 Warfarin）。' },
};

// 高風險藥物警示
const HIGH_ALERT_MEDS = [
  { keywords: ['warfarin','華法林'],       level: 'critical', reason: '窄治療窗口藥物，需定期監測 INR（目標 2–3），注意出血徵兆。' },
  { keywords: ['insulin','胰島素'],        level: 'warning',  reason: '注意低血糖風險（血糖<70 mg/dL），教導 15-15 法則，備妥葡萄糖片。' },
  { keywords: ['digoxin','地高辛'],        level: 'critical', reason: '窄治療窗口；毒性症狀包含噁心、視覺黃綠色改變、心律不整。' },
  { keywords: ['methotrexate','甲氨蝶呤'], level: 'critical', reason: '每週劑量（非每日）；需補充葉酸；監測肝腎功能與全血球計數。' },
  { keywords: ['lithium','鋰鹽'],          level: 'critical', reason: '窄治療窗口；避免缺水與低鈉；監測鋰濃度、腎功能與甲狀腺功能。' },
  { keywords: ['amiodarone','胺碘酮'],     level: 'warning',  reason: '多重器官毒性：肺、甲狀腺、肝；長期使用需定期監測肺功能與甲狀腺。' },
  { keywords: ['opioid','嗎啡','oxycodone','fentanyl','芬太尼'], level: 'warning', reason: '呼吸抑制風險；注意與苯二氮䓬類藥物合用；評估疼痛與成癮風險。' },
  { keywords: ['metformin','二甲雙胍'],    level: 'info',     reason: '造影檢查前後 48 小時暫停；eGFR<45 時減量，eGFR<30 時停用。' },
];

// ══════════════════════════════════════════════════════════════
function setLoader(text, sub) {
  const t = document.getElementById('loader-text');
  const s = document.getElementById('loader-sub');
  if (t) t.textContent = text;
  if (s && sub) s.textContent = sub;
}
function showError(msg) {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('error-box').style.display = 'block';
  document.getElementById('error-msg').textContent = msg;
}

// ── 主流程 ─────────────────────────────────────────────────────
async function init() {
  setLoader('正在進行 SMART on FHIR 認證...', 'SMART on FHIR 認證中');
  try {
    const smart = await FHIR.oauth2.ready();
    setLoader('連線成功，讀取病人資料...', `Patient ID: ${smart.patient.id}`);
    const pid = smart.patient.id;
    const [patient, bpObs, hba1cObs, otherObs, conds, meds, allergies] = await Promise.all([
      smart.request(`Patient/${pid}`),
      smart.request(`Observation?patient=${pid}&code=${LOINC_BP_PANEL}&_sort=-date&_count=3`),
      smart.request(`Observation?patient=${pid}&code=${LOINC_HBAC}&_sort=-date&_count=4`),
      smart.request(`Observation?patient=${pid}&code=${LOINC_HR},${LOINC_GLUCOSE},${LOINC_CREAT}&_sort=-date&_count=6`),
      smart.request(`Condition?patient=${pid}&clinical-status=active`),
      smart.request(`MedicationRequest?patient=${pid}&status=active`),
      smart.request(`AllergyIntolerance?patient=${pid}`).catch(()=>({entry:[]}))
    ]);
    renderAll(patient, bpObs, hba1cObs, otherObs, conds, meds, allergies, true);
  } catch (err) {
    console.warn('SMART failed:', err);
    setLoader('SMART 授權失敗，切換至 DEMO 模式...', '連接 hapi.fhir.tw');
    setTimeout(loadDemo, 1200);
  }
}

async function loadDemo() {
  try {
    const client = new FHIR.Client({ serverUrl: 'https://hapi.fhir.tw/fhir' });
    setLoader('讀取 DEMO 病人資料...', 'hapi.fhir.tw/fhir');
    const patBundle = await client.request('Patient?_count=1');
    const patient = patBundle.entry?.[0]?.resource;
    if (!patient) throw new Error('無測試病患');
    const pid = patient.id;
    const [bpObs, hba1cObs, otherObs, conds, meds, allergies] = await Promise.all([
      client.request(`Observation?patient=${pid}&code=${LOINC_BP_PANEL}&_sort=-date&_count=3`).catch(()=>({entry:[]})),
      client.request(`Observation?patient=${pid}&code=${LOINC_HBAC}&_sort=-date&_count=4`).catch(()=>({entry:[]})),
      client.request(`Observation?patient=${pid}&code=${LOINC_HR},${LOINC_GLUCOSE},${LOINC_CREAT}&_sort=-date&_count=6`).catch(()=>({entry:[]})),
      client.request(`Condition?patient=${pid}&clinical-status=active`).catch(()=>({entry:[]})),
      client.request(`MedicationRequest?patient=${pid}&status=active`).catch(()=>({entry:[]})),
      client.request(`AllergyIntolerance?patient=${pid}`).catch(()=>({entry:[]}))
    ]);
    renderAll(patient, bpObs, hba1cObs, otherObs, conds, meds, allergies, false);
  } catch (e) {
    showError(`DEMO 模式失敗：${e.message}`);
  }
}

// ── 渲染主函式 ─────────────────────────────────────────────────
function renderAll(patient, bpObs, hba1cObs, otherObs, conds, meds, allergies, isSmart) {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  if (!isSmart) {
    const b = document.getElementById('mode-badge');
    b.style.display = 'inline-flex';
    b.className = 'badge badge-amber';
    b.innerHTML = '🔬 DEMO (hapi.fhir.tw)';
  }

  // ── 病人資訊 ──────────────────────────────────────────────
  const nameObj = patient.name?.[0];
  const name = nameObj?.text
    || [nameObj?.family, ...(nameObj?.given||[])].filter(Boolean).join(' ')
    || '匿名病患';
  document.getElementById('p-name').textContent = name;

  let age = null;
  if (patient.birthDate) {
    const dob = new Date(patient.birthDate);
    age = Math.floor((Date.now() - dob) / 31557600000);
  }
  const gMap = { male:'男性', female:'女性', other:'其他', unknown:'不詳' };
  const gender = gMap[patient.gender] || '不詳';

  const metaDiv = document.getElementById('p-meta-badges');
  metaDiv.innerHTML = `
    <span class="badge badge-gray">${gender}</span>
    ${age !== null ? `<span class="badge badge-gray">${age} 歲</span>` : ''}
    ${patient.birthDate ? `<span class="badge badge-gray"><i class="fa-solid fa-calendar-days" style="font-size:9px"></i>&nbsp;${patient.birthDate}</span>` : ''}
    <span class="badge badge-gray" style="font-family:'JetBrains Mono',monospace;font-size:10px">ID: ${patient.id}</span>
  `;

  // Avatar 顏色
  document.getElementById('p-avatar').style.background =
    patient.gender === 'female' ? 'rgba(188,140,255,0.15)' : 'var(--green-dim)';

  // ── 解析資料 ─────────────────────────────────────────────
  // 血壓
  const bpList = (bpObs.entry||[]).map(e=>e.resource);
  let sbpVal=null, dbpVal=null, bpDate=null;
  if (bpList.length > 0) {
    const first = bpList[0];
    const sbpComp = first.component?.find(c => c.code.coding?.some(cc=>cc.code===LOINC_SBP));
    const dbpComp = first.component?.find(c => c.code.coding?.some(cc=>cc.code===LOINC_DBP));
    sbpVal = sbpComp?.valueQuantity?.value ?? null;
    dbpVal = dbpComp?.valueQuantity?.value ?? null;
    bpDate = first.effectiveDateTime || first.issued || null;
  }

  // HbA1c
  const hba1cList = (hba1cObs.entry||[]).map(e=>e.resource)
    .sort((a,b)=>new Date(b.effectiveDateTime||0)-new Date(a.effectiveDateTime||0));
  const hba1cVal = hba1cList[0]?.valueQuantity?.value ?? null;

  // 其他觀察
  const otherList = (otherObs.entry||[]).map(e=>e.resource);
  const findObs = (code) => otherList.find(o=>o.code?.coding?.some(c=>c.code===code))?.valueQuantity?.value ?? null;
  const hrVal  = findObs(LOINC_HR);
  const glcVal = findObs(LOINC_GLUCOSE);
  const creatVal = findObs(LOINC_CREAT);

  // 診斷
  const condList = (conds.entry||[]).map(e=>e.resource);

  // 用藥
  const medList = (meds.entry||[]).map(e=>e.resource);

  // 過敏
  const allergyList = (allergies.entry||[]).map(e=>e.resource);

  // ── 渲染生理指標 ─────────────────────────────────────────
  renderVitals(sbpVal, dbpVal, bpDate, hba1cVal, hrVal, glcVal, creatVal);

  // ── 渲染診斷 ─────────────────────────────────────────────
  renderConditions(condList);

  // ── 渲染用藥 ─────────────────────────────────────────────
  renderMeds(medList);

  // ── CDS 引擎 ──────────────────────────────────────────────
  const cdsResult = runCDS(sbpVal, dbpVal, hba1cVal, hrVal, glcVal, creatVal, condList, medList, allergyList, age, patient.gender);

  // ── 安全評分 ──────────────────────────────────────────────
  renderSafetyScore(cdsResult.score);

  // ── CDS 渲染 ──────────────────────────────────────────────
  renderCDS(cdsResult);
}

// ── 生理指標 ─────────────────────────────────────────────────
function renderVitals(sbp, dbp, bpDate, hba1c, hr, glc, creat) {
  const items = [];

  // 血壓
  if (sbp !== null) {
    const sbpColor = sbp > 160 ? 'var(--red)' : sbp > 140 ? 'var(--amber)' : 'var(--green)';
    const sbpBadge = sbp > 160 ? '<span class="badge badge-red">危急</span>' : sbp > 140 ? '<span class="badge badge-amber">偏高</span>' : '<span class="badge badge-green">正常</span>';
    items.push(`
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:11px;color:var(--text2)">血壓（收縮/舒張）</span>
          ${sbpBadge}
        </div>
        <div style="display:flex;align-items:baseline;gap:4px">
          <span class="metric-value" style="font-size:32px;color:${sbpColor}">${sbp}</span>
          ${dbp !== null ? `<span class="metric-value" style="font-size:20px;color:var(--text2)">/${dbp}</span>` : ''}
          <span style="font-size:12px;color:var(--text3);margin-left:2px">mmHg</span>
        </div>
        ${bpDate ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">${new Date(bpDate).toLocaleDateString('zh-TW')}</div>` : ''}
        <div class="progress-bar" style="margin-top:8px">
          <div class="progress-fill" style="width:${Math.min(sbp/200*100,100)}%;background:${sbpColor}"></div>
        </div>
      </div>`);
  } else {
    items.push(`<div style="padding:12px;background:var(--surface2);border-radius:8px;font-size:13px;color:var(--text2);text-align:center">血壓資料未偵測</div>`);
  }

  // HbA1c
  if (hba1c !== null) {
    const c = hba1c > 8 ? 'var(--red)' : hba1c > 7 ? 'var(--amber)' : 'var(--green)';
    const badge = hba1c > 8 ? '<span class="badge badge-red">控制不佳</span>' : hba1c > 7 ? '<span class="badge badge-amber">需改善</span>' : '<span class="badge badge-green">達標</span>';
    items.push(`
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:11px;color:var(--text2)">HbA1c 糖化血色素</span>${badge}
        </div>
        <div style="display:flex;align-items:baseline;gap:3px">
          <span class="metric-value" style="font-size:28px;color:${c}">${hba1c.toFixed(1)}</span>
          <span style="font-size:12px;color:var(--text3)">%</span>
        </div>
        <div class="progress-bar" style="margin-top:8px">
          <div class="progress-fill" style="width:${Math.min(hba1c/12*100,100)}%;background:${c}"></div>
        </div>
      </div>`);
  }

  // 其他指標
  const extras = [];
  if (hr !== null) {
    const hc = hr > 100 ? 'var(--amber)' : hr < 60 ? 'var(--amber)' : 'var(--text)';
    extras.push(`<div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">心率</div>
      <div class="metric-value" style="font-size:20px;color:${hc}">${hr}</div>
      <div style="font-size:10px;color:var(--text3)">bpm</div>
    </div>`);
  }
  if (glc !== null) {
    const gc = glc > 200 ? 'var(--red)' : glc > 126 ? 'var(--amber)' : glc < 70 ? 'var(--amber)' : 'var(--green)';
    extras.push(`<div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">血糖</div>
      <div class="metric-value" style="font-size:20px;color:${gc}">${glc}</div>
      <div style="font-size:10px;color:var(--text3)">mg/dL</div>
    </div>`);
  }
  if (creat !== null) {
    const cc = creat > 1.5 ? 'var(--amber)' : creat > 2.0 ? 'var(--red)' : 'var(--text)';
    extras.push(`<div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">肌酐</div>
      <div class="metric-value" style="font-size:20px;color:${cc}">${creat}</div>
      <div style="font-size:10px;color:var(--text3)">mg/dL</div>
    </div>`);
  }
  if (extras.length > 0) {
    items.push(`<div style="display:flex;gap:8px">${extras.join('')}</div>`);
  }

  document.getElementById('vitals-content').innerHTML = items.join('') ||
    `<p style="color:var(--text2);font-size:13px;padding:8px">無生理指標資料</p>`;
}

// ── 診斷 ──────────────────────────────────────────────────────
function renderConditions(condList) {
  const countEl = document.getElementById('cond-count');
  countEl.textContent = condList.length;

  const html = condList.map(c => {
    const text = c.code?.text || c.code?.coding?.[0]?.display || '未命名';
    const sev = c.severity?.text || c.severity?.coding?.[0]?.display;
    const onset = c.onsetDateTime ? new Date(c.onsetDateTime).toLocaleDateString('zh-TW') : null;
    const isSevere = sev?.match(/severe|嚴重/i);
    return `<div class="cond-chip">
      <i class="fa-solid fa-circle" style="font-size:6px;color:${isSevere?'var(--red)':'var(--blue)'}"></i>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${text}</div>
        ${sev||onset ? `<div style="font-size:10px;color:var(--text3);margin-top:1px">${sev||''}${sev&&onset?' · ':''}${onset||''}</div>` : ''}
      </div>
    </div>`;
  }).join('') || `<p style="font-size:13px;color:var(--text2);padding:8px">無活動中診斷紀錄</p>`;

  document.getElementById('cond-content').innerHTML = html;
}

// ── 用藥 ──────────────────────────────────────────────────────
function renderMeds(medList) {
  const countEl = document.getElementById('med-count');
  countEl.textContent = medList.length;

  const html = medList.map(med => {
    const name = med.medicationCodeableConcept?.text
      || med.medicationCodeableConcept?.coding?.[0]?.display
      || med.medicationReference?.display
      || '未知藥物';
    const dosage = med.dosageInstruction?.[0]?.text
      || (med.dosageInstruction?.[0]?.doseAndRate?.[0]?.doseQuantity?.value
        ? `${med.dosageInstruction[0].doseAndRate[0].doseQuantity.value} ${med.dosageInstruction[0].doseAndRate[0].doseQuantity.unit||''}`
        : null);
    const freq = med.dosageInstruction?.[0]?.timing?.code?.text || null;

    // 高警示藥物標記
    const isHighAlert = HIGH_ALERT_MEDS.some(h => h.keywords.some(k => name.toLowerCase().includes(k.toLowerCase())));

    return `<div class="cond-chip" style="${isHighAlert?'border-color:rgba(210,153,34,0.3);background:var(--amber-dim);':''}">
      <i class="fa-solid fa-capsules" style="font-size:11px;color:${isHighAlert?'var(--amber)':'var(--violet)'}"></i>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;display:flex;align-items:center;gap:6px">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
          ${isHighAlert ? '<span class="badge badge-amber" style="font-size:9px;padding:1px 6px;flex-shrink:0">高警示</span>' : ''}
        </div>
        ${dosage||freq ? `<div style="font-size:10px;color:var(--text3);margin-top:1px">${[dosage,freq].filter(Boolean).join(' · ')}</div>` : ''}
      </div>
    </div>`;
  }).join('') || `<p style="font-size:13px;color:var(--text2);padding:8px">無活躍用藥紀錄</p>`;

  document.getElementById('med-content').innerHTML = html;
}

// ── CDS 規則引擎 ──────────────────────────────────────────────
function runCDS(sbp, dbp, hba1c, hr, glc, creat, condList, medList, allergyList, age, gender) {
  const alerts = [];
  const recommendations = [];
  let riskScore = 100; // 從 100 扣分

  const medNames = medList.map(m =>
    (m.medicationCodeableConcept?.text || m.medicationCodeableConcept?.coding?.[0]?.display || '').toLowerCase()
  );
  const condNames = condList.map(c =>
    (c.code?.text || c.code?.coding?.[0]?.display || '').toLowerCase()
  );

  // ─ 生理指標警示 ─────────────────────────────────────────
  if (sbp !== null) {
    if (sbp > 180) {
      alerts.push({ level:'critical', icon:'fa-triangle-exclamation',
        title:'高血壓危象', detail:`收縮壓 ${sbp} mmHg，需立即評估急性器官損傷（心臟、腎臟、腦）。考慮靜脈降壓藥物治療。` });
      riskScore -= 25;
    } else if (sbp > 160) {
      alerts.push({ level:'critical', icon:'fa-heart-pulse',
        title:'嚴重高血壓', detail:`收縮壓 ${sbp} mmHg，建議積極調整降壓藥物，並排查次發性高血壓原因。` });
      riskScore -= 18;
    } else if (sbp > 140) {
      alerts.push({ level:'warning', icon:'fa-circle-exclamation',
        title:'血壓偏高', detail:`收縮壓 ${sbp} mmHg，目標 <130/80 mmHg。確認用藥依從性及生活型態調整。` });
      riskScore -= 10;
    }
    if (sbp < 90) {
      alerts.push({ level:'critical', icon:'fa-arrow-trend-down',
        title:'低血壓警示', detail:`收縮壓 ${sbp} mmHg，需排查低血壓原因（脫水、藥物、心臟功能）。` });
      riskScore -= 20;
    }
  }

  if (hba1c !== null) {
    if (hba1c > 9) {
      alerts.push({ level:'critical', icon:'fa-droplet',
        title:'血糖嚴重失控', detail:`HbA1c ${hba1c.toFixed(1)}%，顯著高於目標值，大幅增加微血管及大血管併發症風險。建議立即回診調整治療方案。` });
      riskScore -= 20;
    } else if (hba1c > 8) {
      alerts.push({ level:'warning', icon:'fa-droplet',
        title:'血糖控制不佳', detail:`HbA1c ${hba1c.toFixed(1)}%，超過安全目標（<7%）。需強化飲食控制並評估是否調整降糖藥物。` });
      riskScore -= 12;
    }
  }

  if (hr !== null) {
    if (hr > 120) {
      alerts.push({ level:'warning', icon:'fa-heart',
        title:'心搏過速', detail:`心率 ${hr} bpm，需排查原因（發燒、貧血、心房顫動、藥物、甲狀腺亢進）。` });
      riskScore -= 8;
    }
    if (hr < 50) {
      alerts.push({ level:'warning', icon:'fa-heart',
        title:'心搏過緩', detail:`心率 ${hr} bpm，需評估是否由 Beta-blocker 或 Digoxin 過量引起。` });
      riskScore -= 8;
    }
  }

  if (glc !== null) {
    if (glc < 70) {
      alerts.push({ level:'critical', icon:'fa-bolt',
        title:'低血糖', detail:`血糖 ${glc} mg/dL，立即補充 15g 快速糖分（葡萄糖片/方糖），15 分鐘後再測。若無改善需就醫。` });
      riskScore -= 20;
    } else if (glc > 300) {
      alerts.push({ level:'critical', icon:'fa-droplet',
        title:'嚴重高血糖', detail:`血糖 ${glc} mg/dL，需排查酮酸中毒（DKA）或高血糖高滲透壓狀態（HHS），考慮急診評估。` });
      riskScore -= 18;
    }
  }

  if (creat !== null && creat > 2.0) {
    alerts.push({ level:'warning', icon:'fa-kidney',
      title:'腎功能異常', detail:`血肌酐 ${creat} mg/dL，需評估 eGFR 並調整腎排泄藥物劑量（Metformin、部分抗生素、DOAC）。` });
    riskScore -= 12;
  }

  // ─ 高警示藥物 ─────────────────────────────────────────
  medList.forEach(med => {
    const name = (med.medicationCodeableConcept?.text || med.medicationCodeableConcept?.coding?.[0]?.display || '').toLowerCase();
    HIGH_ALERT_MEDS.forEach(ha => {
      if (ha.keywords.some(k => name.includes(k.toLowerCase()))) {
        const level = ha.level;
        const dispName = med.medicationCodeableConcept?.text || med.medicationCodeableConcept?.coding?.[0]?.display || name;
        alerts.push({ level, icon:'fa-capsules',
          title:`高警示藥物：${dispName}`,
          detail: ha.reason });
        if (level === 'critical') riskScore -= 8;
        else if (level === 'warning') riskScore -= 4;
      }
    });
  });

  // ─ 藥物交互作用 ─────────────────────────────────────────
  DRUG_INTERACTIONS.forEach(rule => {
    const hasDrug = rule.drugs.some(d => medNames.some(mn => mn.includes(d.toLowerCase())));
    const hasFlagWith = rule.flagWith.some(d => medNames.some(mn => mn.includes(d.toLowerCase())));
    if (hasDrug && hasFlagWith) {
      alerts.push({ level: rule.severity, icon:'fa-triangle-exclamation',
        title:'藥物交互作用', detail: rule.msg });
      riskScore -= rule.severity === 'critical' ? 15 : 8;
    }
  });

  // ─ 過敏警示 ─────────────────────────────────────────────
  allergyList.forEach(al => {
    const substance = al.code?.text || al.code?.coding?.[0]?.display || '未知物質';
    const critStatus = al.criticality;
    if (critStatus === 'high' || critStatus === 'unable-to-assess') {
      alerts.push({ level:'critical', icon:'fa-allergies',
        title:`嚴重過敏：${substance}`,
        detail:`此病患對 ${substance} 有嚴重過敏紀錄，處方前請確認所有藥物成分。` });
      riskScore -= 10;
    }
  });

  // ─ 老年特殊考量 ──────────────────────────────────────────
  if (age !== null && age >= 65) {
    const beersMeds = medNames.filter(mn =>
      ['benzodiazepine','diazepam','lorazepam','diphenhydramine','苯海拉明',
       'amitriptyline','tricyclic'].some(k => mn.includes(k))
    );
    if (beersMeds.length > 0) {
      alerts.push({ level:'warning', icon:'fa-person-cane',
        title:`老年用藥警示（Beers Criteria）`,
        detail:`偵測到 Beers Criteria 高風險藥物，高齡患者使用可能增加跌倒、認知障礙、尿滯留等風險，建議評估替代用藥。` });
      riskScore -= 10;
    }
  }

  // ─ 診斷驅動建議 ─────────────────────────────────────────
  condList.forEach(c => {
    const text = c.code?.text || c.code?.coding?.[0]?.display || '';
    Object.keys(CONDITION_RECOMMENDATIONS).forEach(key => {
      if (text.toLowerCase().includes(key.toLowerCase())) {
        const rec = CONDITION_RECOMMENDATIONS[key];
        recommendations.push({ icon: rec.icon, color: rec.color, title: `${text}：管理建議`, text: rec.text });
      }
    });
  });

  // ─ 生理指標建議（補充） ───────────────────────────────────
  if (hba1c !== null && hba1c > 7 && !recommendations.some(r => r.title.includes('血糖') || r.title.includes('糖尿'))) {
    recommendations.push({ icon:'fa-droplet', color:'var(--amber)', title:'血糖管理', text:'HbA1c 超標，建議每日監測血糖，記錄飲食日誌，並與醫師評估藥物調整必要性。' });
  }
  if (sbp !== null && sbp > 140 && !recommendations.some(r => r.title.includes('血壓') || r.title.includes('高血壓'))) {
    recommendations.push({ icon:'fa-heart', color:'var(--blue)', title:'血壓控制', text:'目標血壓 <130/80 mmHg。低鈉飲食（≤2g/日）、規律有氧運動、體重管理、限制酒精攝取。' });
  }
  if (medList.length > 5) {
    recommendations.push({ icon:'fa-list-check', color:'var(--violet)', title:'多重用藥評估', text:`目前有 ${medList.length} 項活躍用藥，建議定期進行全面藥物審查（Medication Reconciliation），減少不必要用藥。` });
    riskScore -= 5;
  }
  if (recommendations.length === 0) {
    recommendations.push({ icon:'fa-circle-check', color:'var(--green)', title:'目前無特殊臨床建議', text:'生理指標及用藥暫未觸發特定建議，請維持定期回診追蹤。' });
  }
  if (creat !== null && creat > 1.2) {
    recommendations.push({ icon:'fa-kidney', color:'var(--violet)', title:'腎功能監測', text:'定期追蹤 eGFR 及尿液微量白蛋白。避免 NSAIDs，確認 Metformin 及其他腎排泄藥物劑量適切性。' });
  }

  // 最終評分夾值
  riskScore = Math.max(5, Math.min(100, riskScore));

  return { alerts, recommendations, score: riskScore, medCount: medList.length, alertCount: alerts.length };
}

// ── 安全評分環 ───────────────────────────────────────────────
function renderSafetyScore(score) {
  const r = 40, cx = 48, cy = 48;
  const circ = 2 * Math.PI * r;
  const fill = circ * (1 - score / 100);
  const color = score >= 80 ? '#3fb950' : score >= 60 ? '#d29922' : '#f85149';
  document.getElementById('safety-score-box').innerHTML = `
    <div class="score-ring">
      <svg width="96" height="96" viewBox="0 0 96 96">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
          stroke-dasharray="${circ}" stroke-dashoffset="${fill}"
          stroke-linecap="round" style="transition:stroke-dashoffset 1.2s ease"/>
      </svg>
      <div class="score-num" style="color:${color}">${score}</div>
    </div>
    <div style="font-size:10px;color:var(--text3);text-align:center;margin-top:4px">安全評分</div>
  `;
}

// ── CDS 渲染 ─────────────────────────────────────────────────
function renderCDS(cdsResult) {
  const { alerts, recommendations, medCount, alertCount } = cdsResult;

  // 摘要 badge
  const summaryDiv = document.getElementById('cds-summary-badges');
  const critCount = alerts.filter(a=>a.level==='critical').length;
  const warnCount = alerts.filter(a=>a.level==='warning').length;
  summaryDiv.innerHTML = [
    critCount > 0 ? `<span class="badge badge-red"><i class="fa-solid fa-triangle-exclamation" style="font-size:9px"></i> 危急 ${critCount}</span>` : '',
    warnCount > 0 ? `<span class="badge badge-amber"><i class="fa-solid fa-circle-exclamation" style="font-size:9px"></i> 警示 ${warnCount}</span>` : '',
    `<span class="badge badge-gray">用藥 ${medCount} 項</span>`,
    critCount === 0 && warnCount === 0 ? `<span class="badge badge-green">無高風險警示</span>` : ''
  ].filter(Boolean).join('');

  // 安全警告
  const alertsDiv = document.getElementById('safety-alerts');
  if (alerts.length === 0) {
    alertsDiv.innerHTML = `
      <div class="alert-card alert-success">
        <i class="fa-solid fa-shield-check alert-icon"></i>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--green)">用藥安全：無明顯警示</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px">目前分析之生理指標、用藥紀錄及診斷未觸發安全警告。</div>
        </div>
      </div>`;
  } else {
    alertsDiv.innerHTML = alerts.map(a => {
      const cls = a.level==='critical'?'alert-critical':a.level==='warning'?'alert-warning':a.level==='med'?'alert-med':'alert-info';
      const titleColor = a.level==='critical'?'var(--red)':a.level==='warning'?'var(--amber)':'var(--blue)';
      const pulse = a.level==='critical' ? '<span class="pulse-red"></span>' : a.level==='warning' ? '<span class="pulse-amber"></span>' : '';
      return `
        <div class="alert-card ${cls}">
          <i class="fa-solid ${a.icon} alert-icon"></i>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
              ${pulse}
              <span style="font-size:13px;font-weight:700;color:${titleColor}">${a.title}</span>
            </div>
            <div style="font-size:12px;color:var(--text2);line-height:1.6">${a.detail}</div>
          </div>
        </div>`;
    }).join('');
  }

  // 個人化建議
  const recsDiv = document.getElementById('cds-recommendations');
  recsDiv.innerHTML = recommendations.map(r => `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;gap:10px;align-items:flex-start;transition:border-color 0.15s" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="width:28px;height:28px;border-radius:7px;background:${r.color}22;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid ${r.color}44">
        <i class="fa-solid ${r.icon}" style="font-size:12px;color:${r.color}"></i>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px">${r.title}</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.65">${r.text}</div>
      </div>
    </div>`).join('');
}

// ── 啟動 ──────────────────────────────────────────────────────
window.onload = init;
</script>
