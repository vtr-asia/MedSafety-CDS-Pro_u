<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>糖尿病共照網 - 驗證成功</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <style>
        /* 延用之前的 UI 樣式 ... (此處省略部分 CSS 以保持簡潔) */
        :root { --primary-color: #3498db; --bg-color: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg-color); padding: 40px; text-align: center; }
        .success-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; min-width: 400px; }
        .token-box { background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; word-break: break-all; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="success-card">
    <i class="fas fa-check-circle fa-4x" style="color: #2ecc71; margin-bottom: 20px;"></i>
    <h2>第二階段測試：OAuth 授權成功</h2>
    <p>系統已收到授權碼 (Authorization Code)，正在交換 Access Token...</p>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <div id="patient-info" style="text-align: left; display: none;">
        <p><strong><i class="fas fa-id-badge"></i> 病患 ID:</strong> <span id="p-id">讀取中...</span></p>
        <p><strong><i class="fas fa-user"></i> 授權範圍:</strong> <span id="p-scope" style="font-size: 12px; color: #666;">讀取中...</span></p>
    </div>

    <div id="status-msg" style="color: #3498db; margin-top: 10px;">
        <i class="fas fa-spinner fa-spin"></i> 正在通訊中...
    </div>

    <div id="debug-token" class="token-box" style="display: none;"></div>
</div>

<script>
    // 當頁面載入時，fhirclient 會自動尋找 URL 中的 code 並嘗試與伺服器交換 Token
    FHIR.oauth2.ready()
        .then(client => {
            console.log("Client is ready:", client);
            document.getElementById('status-msg').innerHTML = "Access Token 取得成功！";
            document.getElementById('patient-info').style.display = 'block';
            
            // 顯示目前登入的 Context 資訊
            document.getElementById('p-id').innerText = client.patient.id;
            document.getElementById('p-scope').innerText = client.state.tokenResponse.scope;

            // 如果你想看 Access Token 的內容 (測試階段建議顯示，生產環境請隱藏)
            document.getElementById('debug-token').style.display = 'block';
            document.getElementById('debug-token').innerText = "Access Token: " + client.state.tokenResponse.access_token;

            // 這裡可以開始呼叫糖尿病共照網的品質指標 API
            // 例如: client.request("Observation?category=laboratory&code=4548-4")
        })
        .catch(error => {
            console.error("OAuth Exchange Error:", error);
            document.getElementById('status-msg').style.color = "#e74c3c";
            document.getElementById('status-msg').innerHTML = "<i class='fas fa-times-circle'></i> 交換失敗：" + error.message;
        });
</script>

</body>
</html>
