<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧用藥安全監測小幫手</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 25px 25px 0 -10px rgb(16 185 129); }
    </style>
</head>
<body class="bg-gray-50">

    <div id="global-loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[10000] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="relative">
            <div class="w-20 h-20 border-4 border-emerald-100 border-t-emerald-500 rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center text-2xl">推</div>
        </div>
        <p class="mt-4 text-emerald-700 font-medium animate-pulse">安全連線中，正在同步 FHIR 醫療數據...</p>
    </div>

    <div class="max-w-7xl mx-auto">
        <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
            <div class="px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-500 text-white rounded-3xl flex items-center justify-center text-4xl">🩺</div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">智慧用藥安全監測小幫手</h1>
                        <p class="text-emerald-600 text-sm flex items-center gap-1">
                            <span class="relative flex h-3 w-3">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                            </span>
                            <span id="system-status">正在連線至 FHIR 伺服器...</span>
                        </p>
                    </div>
                </div>
                
                <div onclick="showPatientModal()" class="flex items-center gap-3 cursor-pointer bg-emerald-50 hover:bg-emerald-100 px-6 py-3 rounded-3xl">
                    <div class="text-right">
                        <div id="patient-name-top" class="font-semibold text-lg">讀取中...</div>
                        <div id="patient-info-short" class="text-sm text-gray-500">請稍候</div>
                    </div>
                    <div class="w-12 h-12 bg-emerald-200 text-emerald-700 rounded-2xl flex items-center justify-center text-4xl">👤</div>
                </div>
                
                <div class="flex items-center gap-6 text-gray-600">
                    <a href="#" onclick="logout()" class="flex items-center gap-2 hover:text-emerald-600">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span class="text-sm">登出</span>
                    </a>
                </div>
            </div>
        </nav>

        <div class="flex">
            <div class="w-72 bg-white border-r min-h-[calc(100vh-73px)] p-6 flex flex-col">
                <div class="space-y-2">
                    <a onclick="switchTab(0)" class="tab-item flex items-center gap-3 px-5 py-4 rounded-3xl text-emerald-700 font-medium bg-emerald-50 cursor-pointer" id="tab-0">
                        <i class="fa-solid fa-house w-5"></i> 首頁總覽
                    </a>
                    <a onclick="switchTab(1)" class="tab-item flex items-center gap-3 px-5
